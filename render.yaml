services:
  - type: web
    name: backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      npm ci --legacy-peer-deps || npm install
      npm run build
    startCommand: node dist/index.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        # Set this in Render dashboard to your live storefront URL, e.g. https://niraya1303.vercel.app
        sync: false
      # Replace the values below with your real secrets in the Render dashboard after first deploy
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
